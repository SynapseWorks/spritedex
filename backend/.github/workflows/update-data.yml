name: Update SpriteDex Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 1 * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update sync status file
        run: |
          mkdir -p docs/data
          echo "{\"lastSync\":\"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",\"status\":\"success\"}" > docs/data/sync-status.json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update SpriteDex sync status"
          file_pattern: docs/data/sync-status.json
