<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpeciesDex | SpriteDex</title>
  <style>
    :root {
      --bg: #071510;
      --panel: rgba(18, 45, 34, 0.85);
      --panel-2: rgba(28, 74, 54, 0.75);
      --text: #e8f7ee;
      --muted: #9fc7b1;
      --accent: #7cffc4;
      --amber: #f2b84b;
      --border: rgba(124, 255, 196, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 255, 196, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header, main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.06em;
    }

    .muted { color: var(--muted); }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 28px 0;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(124, 255, 196, 0.1);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
    }

    button.active {
      background: var(--accent);
      color: #062015;
      border-color: var(--accent);
    }

    .species-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: linear-gradient(145deg, var(--panel), rgba(8, 24, 18, 0.82));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.24);
    }

    .card h2 {
      margin: 0 0 4px;
    }

    .scientific {
      color: var(--muted);
      font-style: italic;
      margin-bottom: 16px;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    .tag {
      border: 1px solid var(--border);
      color: var(--amber);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
    }

    .notes {
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      .species-grid {
        grid-template-columns: 1fr;
      }

      header, main {
        padding: 18px;
      }

      nav {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">← SpriteDex Dashboard</a>
      <span class="muted">SpeciesDex Prototype</span>
    </nav>

    <h1>SpeciesDex</h1>
    <p class="muted">
      The known reference library of plants, animals, fungi, insects, and ecological beings.
    </p>
  </header>

  <main>
    <div class="toolbar" id="filters"></div>
    <section class="species-grid" id="speciesGrid"></section>
  </main>

  <script src="data.js"></script>

  <script>
    let activeFilter = "All";

    function getCategories() {
      const categories = speciesData.map(species => species.category);
      return ["All", ...new Set(categories)];
    }

    function renderFilters() {
      const filters = document.getElementById("filters");
      filters.innerHTML = "";

      getCategories().forEach(category => {
        const button = document.createElement("button");
        button.textContent = category;

        if (category === activeFilter) {
          button.classList.add("active");
        }

        button.addEventListener("click", () => {
          activeFilter = category;
          renderFilters();
          renderSpecies();
        });

        filters.appendChild(button);
      });
    }

    function renderSpecies() {
      const grid = document.getElementById("speciesGrid");
      grid.innerHTML = "";

      const filteredSpecies =
        activeFilter === "All"
          ? speciesData
          : speciesData.filter(species => species.category === activeFilter);

      filteredSpecies.forEach(species => {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <h2>${species.commonName}</h2>
          <div class="scientific">${species.scientificName}</div>

          <div class="tag-row">
            <span class="tag">${species.category}</span>
            <span class="tag">${species.status}</span>
            <span class="tag">${species.confidence}</span>
          </div>

          <p class="notes">${species.notes}</p>
        `;

        grid.appendChild(card);
      });
    }

    renderFilters();
    renderSpecies();
  </script>
</body>
</html>
