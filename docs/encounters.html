<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encounter Journal | SpriteDex</title>
  <style>
    :root {
      --bg: #071510;
      --panel: rgba(18, 45, 34, 0.85);
      --text: #e8f7ee;
      --muted: #9fc7b1;
      --accent: #7cffc4;
      --amber: #f2b84b;
      --border: rgba(124, 255, 196, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 255, 196, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header, main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.06em;
    }

    .muted { color: var(--muted); }

    .journal {
      display: grid;
      gap: 16px;
      margin-top: 28px;
    }

    .entry {
      background: linear-gradient(145deg, var(--panel), rgba(8, 24, 18, 0.82));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
    }

    .entry h2 {
      margin: 0 0 6px;
    }

    .meta {
      color: var(--muted);
      line-height: 1.6;
    }

    .tag {
      color: var(--amber);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 999px;
      white-space: nowrap;
      font-size: 0.9rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 1px solid var(--border);
      background: rgba(124, 255, 196, 0.1);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      background: var(--accent);
      color: #062015;
      border-color: var(--accent);
    }

    @media (max-width: 850px) {
      header, main { padding: 18px; }

      nav, .entry {
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .entry {
        display: block;
      }

      .tag {
        display: inline-block;
        margin-top: 14px;
      }
    }

    .app-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}

.app-nav a {
  border: 1px solid var(--border);
  background: rgba(124, 255, 196, 0.08);
  color: var(--text);
  padding: 10px 13px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
}

.app-nav a:hover {
  background: rgba(124, 255, 196, 0.18);
}
    .app-nav a.active {
  background: var(--accent);
  color: #062015;
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(124,255,196,0.35);
}
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">← SpriteDex Dashboard</a>
      <span class="muted">Encounter Journal Prototype</span>
    </nav>

    <h1>Encounter Journal</h1>
    <p class="muted">
      Your personal field history: sightings, locations, dates, confidence, and notes.
    </p>

    <div class="app-nav">
  <a href="index.html">Dashboard</a>
  <a href="scanner.html">Scanner</a>
  <a href="species.html">SpeciesDex</a>
  <a href="encounters.html" class="active">Encounters</a>
  <a href="map.html">Map</a>
  <a href="collection.html">Collection</a>
</div>

    <div class="button-row">
      <button class="primary" onclick="addMockEncounter()">Add Mock Encounter</button>
      <button onclick="window.location.href='species.html'">Open SpeciesDex</button>
    </div>
  </header>

  <main>
    <section class="journal" id="journal"></section>
  </main>

<script>
  let speciesData = [];
  let encounterData = [];

  async function loadData() {
    const [speciesResponse, encounterResponse] = await Promise.all([
      fetch("./data/species.json"),
      fetch("./data/encounters.json")
    ]);

    speciesData = await speciesResponse.json();
    encounterData = await encounterResponse.json();
  }
</script>
  <script>
    function renderJournal() {
      const journal = document.getElementById("journal");
      journal.innerHTML = "";

      encounterData.forEach(encounter => {
        const entry = document.createElement("article");
        entry.className = "entry";

        entry.innerHTML = `
          <div>
            <h2>${encounter.name}</h2>
            <div class="meta">
              ${encounter.location}<br>
              ${encounter.date}
            </div>
          </div>

          <span class="tag">${encounter.category} · ${encounter.confidence}</span>
        `;

        journal.appendChild(entry);
      });
    }

    function addMockEncounter() {
      const newEncounter = {
        id: Date.now(),
        speciesId: 2,
        name: "Yarrow",
        category: "Plant",
        confidence: "AI candidate",
        location: "Field edge",
        date: new Date().toISOString().split("T")[0]
      };

      encounterData.unshift(newEncounter);
      renderJournal();
    }

loadData().then(() => {
  renderJournal();
});
  </script>
</body>
</html>
