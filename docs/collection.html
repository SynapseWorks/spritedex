<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection | SpriteDex</title>
  <style>
    :root {
      --bg: #071510;
      --panel: rgba(18, 45, 34, 0.85);
      --text: #e8f7ee;
      --muted: #9fc7b1;
      --accent: #7cffc4;
      --amber: #f2b84b;
      --border: rgba(124, 255, 196, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 255, 196, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header, main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.06em;
    }

    .muted { color: var(--muted); }

    .app-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .app-nav a {
      border: 1px solid var(--border);
      background: rgba(124, 255, 196, 0.08);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .app-nav a.active {
      background: var(--accent);
      color: #062015;
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(124,255,196,0.35);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .panel, .card {
      background: linear-gradient(145deg, var(--panel), rgba(8, 24, 18, 0.82));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.24);
    }

    .stat-number {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--accent);
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 22px;
    }

    .card h2 {
      margin: 0 0 4px;
    }

    .scientific {
      color: var(--muted);
      font-style: italic;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      border: 1px solid var(--border);
      color: var(--amber);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      margin: 4px 4px 0 0;
    }

    @media (max-width: 850px) {
      header, main { padding: 18px; }

      nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats,
      .collection-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">← SpriteDex Dashboard</a>
      <span class="muted">Collection Prototype</span>
    </nav>

    <h1>Collection</h1>
    <p class="muted">
      Track discovered species, confirmed sightings, and your growing ecological field archive.
    </p>

    <div class="app-nav">
      <a href="index.html">Dashboard</a>
      <a href="scanner.html">Scanner</a>
      <a href="species.html">SpeciesDex</a>
      <a href="encounters.html">Encounters</a>
      <a href="map.html">Map</a>
      <a href="collection.html" class="active">Collection</a>
    </div>
  </header>

  <main>
    <section class="stats">
      <div class="panel">
        <div class="stat-number" id="speciesCount">0</div>
        <div class="muted">Known Species</div>
      </div>

      <div class="panel">
        <div class="stat-number" id="encounterCount">0</div>
        <div class="muted">Encounters Logged</div>
      </div>

      <div class="panel">
        <div class="stat-number" id="confirmedCount">0</div>
        <div class="muted">Confirmed / High Confidence</div>
      </div>
    </section>

    <section class="collection-grid" id="collectionGrid"></section>
  </main>

<script>
  let speciesData = [];
  let encounterData = [];

  async function loadData() {
    const [speciesResponse, encounterResponse] = await Promise.all([
      fetch("./data/species.json"),
      fetch("./data/encounters.json")
    ]);

    speciesData = await speciesResponse.json();
    encounterData = await encounterResponse.json();
  }
</script>
  <script>
    function getEncounterCountForSpecies(speciesId) {
      return encounterData.filter(encounter => encounter.speciesId === speciesId).length;
    }

    function renderStats() {
      const confirmed = encounterData.filter(encounter =>
        encounter.confidence.toLowerCase().includes("confirmed") ||
        encounter.confidence.toLowerCase().includes("high")
      ).length;

      document.getElementById("speciesCount").textContent = speciesData.length;
      document.getElementById("encounterCount").textContent = encounterData.length;
      document.getElementById("confirmedCount").textContent = confirmed;
    }

    function renderCollection() {
      const grid = document.getElementById("collectionGrid");
      grid.innerHTML = "";

      speciesData.forEach(species => {
        const count = getEncounterCountForSpecies(species.id);
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <h2>${species.commonName}</h2>
          <div class="scientific">${species.scientificName}</div>
          <span class="tag">${species.category}</span>
          <span class="tag">${count > 0 ? "Discovered" : "Not Yet Encountered"}</span>
          <span class="tag">${count} encounter${count === 1 ? "" : "s"}</span>
        `;

        grid.appendChild(card);
      });
    }

    loadData().then(() => {
      renderStats();
      renderCollection();
    });
  </script>
</body>
</html>
