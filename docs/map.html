<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecological Map | SpriteDex</title>
  <style>
    :root {
      --bg: #071510;
      --panel: rgba(18, 45, 34, 0.85);
      --text: #e8f7ee;
      --muted: #9fc7b1;
      --accent: #7cffc4;
      --amber: #f2b84b;
      --border: rgba(124, 255, 196, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 255, 196, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header, main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.06em;
    }

    .muted { color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 22px;
      margin-top: 28px;
    }

    .map {
      min-height: 560px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background:
        linear-gradient(rgba(124,255,196,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,255,196,0.04) 1px, transparent 1px),
        radial-gradient(circle at 35% 35%, rgba(124, 255, 196, 0.18), transparent 18%),
        radial-gradient(circle at 70% 65%, rgba(242, 184, 75, 0.14), transparent 16%),
        rgba(255,255,255,0.035);
      background-size: 32px 32px, 32px 32px, auto, auto, auto;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.28);
    }

    .pin {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 24px rgba(124,255,196,0.8);
      border: 2px solid rgba(6, 32, 21, 0.9);
      cursor: pointer;
    }

    .pin::after {
      content: attr(data-label);
      position: absolute;
      left: 24px;
      top: -8px;
      white-space: nowrap;
      background: rgba(7, 21, 16, 0.88);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.8rem;
      opacity: 0;
      transform: translateY(4px);
      transition: 0.2s ease;
      pointer-events: none;
    }

    .pin:hover::after {
      opacity: 1;
      transform: translateY(0);
    }

    .panel {
      background: linear-gradient(145deg, var(--panel), rgba(8, 24, 18, 0.82));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .tag {
      color: var(--amber);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    @media (max-width: 850px) {
      header, main { padding: 18px; }

      nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .map {
        min-height: 420px;
      }
    }
    .app-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}

.app-nav a {
  border: 1px solid var(--border);
  background: rgba(124, 255, 196, 0.08);
  color: var(--text);
  padding: 10px 13px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 700;
  font-size: 0.9rem;
}

.app-nav a:hover {
  background: rgba(124, 255, 196, 0.18);
}
    .app-nav a.active {
  background: var(--accent);
  color: #062015;
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(124,255,196,0.35);
}
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">← SpriteDex Dashboard</a>
      <span class="muted">Map Prototype</span>
    </nav>

    <h1>Ecological Map</h1>
    <p class="muted">
      A prototype map of your encounters. Later this becomes Leaflet / MapLibre + PostGIS.
    </p>
    <div class="app-nav">
  <a href="index.html">Dashboard</a>
  <a href="scanner.html">Scanner</a>
  <a href="species.html">SpeciesDex</a>
  <a href="encounters.html">Encounters</a>
  <a href="map.html" class="active">Map</a>
      <a href="collection.html">Collection</a>
</div>
  </header>

  <main>
    <section class="layout">
      <div class="map" id="map"></div>

      <aside class="panel">
        <h2>Encounter Points</h2>
        <p class="muted">Mock locations for the current prototype.</p>
        <div class="list" id="mapList"></div>
      </aside>
    </section>
  </main>

<script>
  let speciesData = [];
  let encounterData = [];

  async function loadData() {
    const [speciesResponse, encounterResponse] = await Promise.all([
      fetch("./data/species.json"),
      fetch("./data/encounters.json")
    ]);

    speciesData = await speciesResponse.json();
    encounterData = await encounterResponse.json();
  }
</script>
  <script>
    const mockMapPositions = [
      { encounterId: 1, x: 34, y: 42 },
      { encounterId: 2, x: 62, y: 28 },
      { encounterId: 3, x: 48, y: 68 }
    ];

    function renderMap() {
      const map = document.getElementById("map");
      const list = document.getElementById("mapList");

      map.innerHTML = "";
      list.innerHTML = "";

      mockMapPositions.forEach(position => {
        const encounter = encounterData.find(item => item.id === position.encounterId);
        if (!encounter) return;

        const pin = document.createElement("div");
        pin.className = "pin";
        pin.style.left = `${position.x}%`;
        pin.style.top = `${position.y}%`;
        pin.dataset.label = encounter.name;

        map.appendChild(pin);

        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <strong>${encounter.name}</strong>
          <div class="tag">${encounter.category} · ${encounter.location}</div>
        `;

        item.addEventListener("click", () => {
          alert(`${encounter.name}\n${encounter.location}\n${encounter.date}`);
        });

        list.appendChild(item);
      });
    }

loadData().then(() => {
  renderMap();
});  </script>
</body>
</html>
