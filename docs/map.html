<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecological Map | SpriteDex</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #071510;
      --panel: rgba(18, 45, 34, 0.85);
      --text: #e8f7ee;
      --muted: #9fc7b1;
      --accent: #7cffc4;
      --amber: #f2b84b;
      --border: rgba(124, 255, 196, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 255, 196, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(242, 184, 75, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header, main {
      max-width: 1200px;
      margin: auto;
      padding: 28px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      margin-bottom: 8px;
      letter-spacing: -0.06em;
    }

    .muted { color: var(--muted); }

    .app-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .app-nav a {
      border: 1px solid var(--border);
      background: rgba(124, 255, 196, 0.08);
      color: var(--text);
      padding: 10px 13px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .app-nav a.active {
      background: var(--accent);
      color: #062015;
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(124,255,196,0.35);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      gap: 22px;
      margin-top: 28px;
    }

    #leafletMap {
      min-height: 560px;
      border-radius: 28px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.28);
      background: rgba(255,255,255,0.035);
    }

    .panel {
      background: linear-gradient(145deg, var(--panel), rgba(8, 24, 18, 0.82));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
    }

    .list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
      max-height: 560px;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .item:hover {
      border-color: var(--accent);
    }

    .tag {
      color: var(--amber);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .leaflet-popup-content-wrapper,
    .leaflet-popup-tip {
      background: #071510;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .popup-image {
      width: 180px;
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
      border: 1px solid var(--border);
    }

    @media (max-width: 850px) {
      header, main { padding: 18px; }

      nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      #leafletMap {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav>
      <a href="index.html">← SpriteDex Dashboard</a>
      <span class="muted">Live Observation Map</span>
    </nav>

    <h1>Ecological Map</h1>
    <p class="muted">
      Recent Ontario iNaturalist observations displayed as a live prototype map layer.
    </p>

    <div class="app-nav">
      <a href="index.html">Dashboard</a>
      <a href="scanner.html">Scanner</a>
      <a href="species.html">SpeciesDex</a>
      <a href="encounters.html">Encounters</a>
      <a href="map.html" class="active">Map</a>
      <a href="collection.html">Collection</a>
    </div>
  </header>

  <main>
    <section class="layout">
      <div id="leafletMap"></div>

      <aside class="panel">
        <h2>Observation Points</h2>
        <p class="muted">Pulled from your generated iNaturalist JSON feed.</p>
        <div class="list" id="mapList">
          <div class="item">Loading map observations...</div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    let map;
    const markers = [];

    async function loadJson(path) {
      const response = await fetch(path + "?v=" + Date.now());
      if (!response.ok) throw new Error(path + " not found");
      return response.json();
    }

    function getObservationName(observation) {
      const taxon = observation.taxon || {};
      return taxon.preferredCommonName || taxon.name || "Unknown taxon";
    }

    function makePopup(observation) {
      const taxon = observation.taxon || {};
      const name = getObservationName(observation);

      const imageHtml = observation.photoUrl
        ? `<img class="popup-image" src="${observation.photoUrl}" alt="${name}">`
        : "";

      const linkHtml = observation.uri
        ? `<br><a href="${observation.uri}" target="_blank" rel="noopener">Open iNaturalist record</a>`
        : "";

      return `
        <strong>${name}</strong><br>
        <em>${taxon.name || ""}</em><br>
        ${observation.placeGuess || ""}
        ${imageHtml}
        ${linkHtml}
      `;
    }

    function initializeMap() {
      map = L.map("leafletMap").setView([44.0, -78.6], 7);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }).addTo(map);
    }

    async function renderLeafletMap() {
      const list = document.getElementById("mapList");

      try {
        const data = await loadJson("./data/inat-ontario-observations.json");
        const observations = data.observations || [];

        initializeMap();
        list.innerHTML = "";

        const validObservations = observations.filter(obs =>
          Number.isFinite(Number(obs.latitude)) &&
          Number.isFinite(Number(obs.longitude))
        );

        if (!validObservations.length) {
          list.innerHTML = `<div class="item">No mappable observations found.</div>`;
          return;
        }

        const bounds = [];

        validObservations.forEach((observation, index) => {
          const lat = Number(observation.latitude);
          const lng = Number(observation.longitude);
          const name = getObservationName(observation);
          const taxon = observation.taxon || {};

          const marker = L.marker([lat, lng])
            .addTo(map)
            .bindPopup(makePopup(observation));

          markers.push(marker);
          bounds.push([lat, lng]);

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <strong>${name}</strong>
            <div class="tag">${taxon.iconicTaxonName || "Observation"} · ${observation.placeGuess || "Ontario"}</div>
          `;

          item.addEventListener("click", () => {
            map.setView([lat, lng], 11);
            marker.openPopup();
          });

          list.appendChild(item);
        });

        map.fitBounds(bounds, { padding: [30, 30] });
      } catch (error) {
        console.error("Map feed failed:", error);
        list.innerHTML = `<div class="item">Could not load iNaturalist observation map data.</div>`;

        initializeMap();
      }
    }

    document.addEventListener("DOMContentLoaded", renderLeafletMap);
  </script>
</body>
</html>
